services:
  ollama:
    image: ollama/ollama:latest
    container_name: myai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: myai-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - OLLAMA_URL=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: myai-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
